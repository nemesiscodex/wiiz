version: 1
name: repo-onboard contributor setup
steps:
  - id: welcome-logo
    type: ascii
    path: .wiiz/logo.txt

  - id: pick-env
    type: select
    message: Pick runtime environment
    var: ENV
    envFile: .env
    sensitive: false
    options:
      - label: Production
        value: production
      - label: Development
        value: development

  - id: input-name
    type: input
    message: Enter your name
    var: NAME
    sensitive: false
    envFile: .env
    required: true

  - id: input-email
    type: input
    message: Enter your email
    var: EMAIL
    sensitive: true
    envFile: .env
    required: true
    validateRegex: "^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$"

  - id: run-example-primitives
    type: confirm
    message: Run optional example steps for the remaining primitives?
    var: RUN_EXAMPLES
    default: "no"
    abortOnDecline: false

  - id: run-example-branch
    type: match
    var: RUN_EXAMPLES
    cases:
      - equals: yes
        steps:
          - id: example-banner
            type: banner
            content: |
              ============================
                OPTIONAL EXAMPLE STEPS
              ============================

          - id: example-display
            type: display
            message: Preparing example outputs for {{NAME}} in {{ENV}} mode.

          - id: example-note
            type: note
            message: These example steps write files under .wiiz/examples so each primitive has a concrete reference.

          - id: example-write-file
            type: file.write
            path: .wiiz/examples/profile.txt
            overwrite: true
            content: |
              name={{NAME}}
              email={{EMAIL}}
              env={{ENV}}

          - id: example-append-file
            type: file.append
            path: .wiiz/examples/activity.log
            content: "example-run name={{NAME}} env={{ENV}}\n"

  - id: check-git
    type: command.check
    command: git
    installHint: Git is required to contribute. Install Git, then re-run onboarding.

  - id: check-bun
    type: command.check
    command: bun
    installHint: Bun is required for this repository. Install Bun, then re-run onboarding.

  - id: install-dependencies
    type: command.run
    command: bun install
    consentMessage: Install project dependencies now?

  - id: run-typecheck
    type: command.run
    command: bun run typecheck
    consentMessage: Run TypeScript type checks now?

  - id: write-env-file
    type: env.write
    path: .env
    overwrite: true
    entries:
      - key: ENV
        value: "{{ENV}}"
      - key: NAME
        value: "{{NAME}}"
      - key: EMAIL
        value: "{{EMAIL}}"

  - id: run-tests
    type: command.run
    command: bun test
    consentMessage: Run the test suite now?
