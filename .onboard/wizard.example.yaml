version: 1
name: Repo bootstrap
steps:
  - id: api-base-url
    type: input
    message: Enter API base URL
    var: API_BASE_URL
    envFile: .env
    sensitive: false
    validateRegex: "^https?://.+"

  - id: node-env
    type: select
    message: Choose environment
    var: NODE_ENV
    envFile: .env
    sensitive: false
    options:
      - label: Development
        value: development
      - label: Staging
        value: staging
      - label: Production
        value: production

  - id: check-bun
    type: command.check
    command: bun
    installHint: Bun is required for this repository. Install Bun, then re-run onboarding.

  - id: install-deps
    type: command.run
    command: bun install
    consentMessage: Install project dependencies now?

  - id: write-env
    type: env.write
    path: .env
    entries:
      - key: API_BASE_URL
        value: "{{API_BASE_URL}}"
      - key: NODE_ENV
        value: "{{NODE_ENV}}"

  - id: append-readme
    type: file.append
    path: README.md
    content: "\nConfigured NODE_ENV={{NODE_ENV}}\n"
